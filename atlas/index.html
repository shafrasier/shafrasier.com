<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MAP — Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap">
<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css">
<script src="https://unpkg.com/pmtiles@4.3.0/dist/pmtiles.js"></script>
<script src="https://unpkg.com/@protomaps/basemaps@5.7.2/dist/basemaps.js"></script>
<style>
  :root {
    --cream:#f0efe4; --light:#fefdfb; --dark:#111111; --gray:#9a958a;
    --serif:"Source Serif 4", Georgia, serif;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--cream); font-family:var(--serif); color:var(--dark); }
  #map { position:fixed; inset:0; }

  /* ── Frosted control panel (matches the MAP's chrome) ── */
  .panel {
    position:fixed; top:0; left:0; z-index:1000;
    width:min(330px, calc(100vw - 24px)); max-height:calc(100% - 24px);
    margin:12px; padding:1.1rem 1.15rem 1rem; overflow-y:auto; scrollbar-width:none;
    background:color-mix(in srgb, var(--light) 74%, transparent);
    -webkit-backdrop-filter:blur(16px) saturate(1.3); backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid rgba(110,105,95,.25); border-radius:16px;
    box-shadow:0 8px 30px rgba(17,17,17,.10);
  }
  .panel::-webkit-scrollbar { display:none; }
  .wordmark { display:flex; align-items:center; gap:.5rem; margin:0 0 .15rem; font-size:1.4rem; font-weight:500; letter-spacing:-0.01em; }
  .wordmark svg { width:1.5rem; height:1.5rem; flex-shrink:0; }
  .wordmark .lab { font-size:.62rem; letter-spacing:.12em; color:var(--gray); border:1px solid rgba(110,105,95,.4); padding:.1rem .4rem; border-radius:99px; margin-left:.2rem; white-space:nowrap; }
  .lede { margin:.3rem 0 .85rem; font-size:.85rem; line-height:1.5; color:rgba(17,17,17,.74); }

  .chips { display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:.85rem; }
  .chip {
    display:inline-flex; align-items:center; gap:.42rem; padding:.3rem .65rem;
    font:inherit; font-size:.8rem; border-radius:999px; cursor:pointer;
    border:1px solid rgba(110,105,95,.35); background:rgba(254,253,251,.5); color:var(--dark);
    transition:background .15s ease, opacity .15s ease;
  }
  .chip .dot { width:9px; height:9px; border-radius:50%; }
  .chip.off { opacity:.38; }
  .chip:hover { background:var(--light); }

  .switchrow { display:flex; flex-direction:column; gap:.45rem; padding-top:.2rem; border-top:1px solid rgba(110,105,95,.22); }
  .switch { display:inline-flex; align-items:center; gap:.45rem; font-size:.82rem; cursor:pointer; user-select:none; }
  .switch input { accent-color:#3a3a35; }
  .hint { font-size:.72rem; color:var(--gray); margin:.65rem 0 0; line-height:1.5; }
  .hint a { color:inherit; }

  /* ── The time deck (hidden until the year switch) ── */
  .deck {
    position:fixed; left:50%; bottom:max(14px, env(safe-area-inset-bottom)); transform:translateX(-50%);
    z-index:1000; width:min(680px, calc(100vw - 20px));
    padding:.8rem 1rem .85rem; border-radius:18px;
    background:color-mix(in srgb, var(--light) 76%, transparent);
    -webkit-backdrop-filter:blur(16px) saturate(1.3); backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid rgba(110,105,95,.25); box-shadow:0 10px 36px rgba(17,17,17,.14);
  }
  .deck[hidden] { display:none; }
  .eras { display:flex; gap:.35rem; overflow-x:auto; padding-bottom:.5rem; scrollbar-width:none; }
  .eras::-webkit-scrollbar { display:none; }
  .era {
    flex:0 0 auto; display:inline-flex; align-items:center; gap:.3rem;
    padding:.22rem .6rem; font:inherit; font-size:.74rem; white-space:nowrap;
    border:1px solid rgba(110,105,95,.35); border-radius:999px; background:rgba(254,253,251,.5);
    color:rgba(17,17,17,.8); cursor:pointer;
  }
  .era.on { background:var(--dark); color:var(--cream); border-color:var(--dark); }
  .era a { color:inherit; text-decoration:none; font-size:.7rem; opacity:.75; }
  .era a:hover { opacity:1; }
  .transport { display:flex; align-items:center; gap:.9rem; }
  .play {
    flex:0 0 auto; width:42px; height:42px; border-radius:50%; border:none; cursor:pointer;
    background:var(--dark); color:var(--cream); font-size:.95rem; display:flex; align-items:center; justify-content:center;
  }
  .year { flex:0 0 auto; width:4.2ch; font-size:1.8rem; font-weight:600; text-align:center; font-variant-numeric:tabular-nums; }
  .track { flex:1; display:flex; flex-direction:column; gap:.12rem; }
  input[type=range] { width:100%; accent-color:#3a3a35; }
  .caption { font-size:.74rem; color:var(--gray); min-height:1.1em; }
  .caption a { color:#2a6f4e; }

  /* ── Popups: cream cards ── */
  .maplibregl-popup-content {
    font-family:var(--serif); color:var(--dark); background:var(--light);
    border-radius:12px; box-shadow:0 10px 36px rgba(17,17,17,.22); padding:.95rem 1.05rem;
  }
  .maplibregl-popup-anchor-bottom .maplibregl-popup-tip { border-top-color:var(--light); }
  .maplibregl-popup-anchor-top .maplibregl-popup-tip { border-bottom-color:var(--light); }
  .maplibregl-popup-close-button { font-size:1.1rem; color:var(--gray); right:4px; top:2px; }
  .pp-name { font-size:1.02rem; font-weight:600; margin:0; }
  .pp-meta { font-size:.72rem; color:var(--gray); margin:.15rem 0 .45rem; letter-spacing:.02em; }
  .pp-blurb { font-size:.85rem; line-height:1.5; margin:0; }
  .pp-link { display:inline-block; margin-top:.55rem; font-size:.8rem; color:#2a6f4e; text-decoration:none; border-bottom:1px solid rgba(42,111,78,.4); }
  .pp-link.soon { color:var(--gray); border-bottom-color:rgba(154,149,138,.4); pointer-events:none; }

  @media (max-width:640px) { .panel { max-height:44vh; } }
</style>
</head>
<body>
<div id="map"></div>

<aside class="panel">
  <h1 class="wordmark">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3.2 6.2 L9 4.2 L15 6.2 L20.8 4.2 V17.8 L15 19.8 L9 17.8 L3.2 19.8 Z"/>
      <line x1="9" y1="4.2" x2="9" y2="17.8"/><line x1="15" y1="6.2" x2="15" y2="19.8"/>
      <circle cx="12" cy="11.4" r="2.1" fill="currentColor" stroke="none"/>
    </svg>
    MAP <span class="lab">ATLAS</span>
  </h1>
  <p class="lede">The city in the MAP's own cartography — cream land, taupe water, serif streets. Tap a dot; tap a neighborhood for its story.</p>

  <div class="chips" id="chips"></div>

  <div class="switchrow">
    <label class="switch"><input type="checkbox" id="hoods" checked> Neighborhood stories</label>
    <label class="switch"><input type="checkbox" id="timeOn"> Travel through time</label>
  </div>

  <p class="hint">Dots with an arrow open their MAP note; the rest are placeholders becoming notes. <a href="/map/">Back to the MAP</a></p>
</aside>

<div class="deck" id="deck" hidden>
  <div class="eras" id="eras"></div>
  <div class="transport">
    <button class="play" id="play" aria-label="Play through the years">▶</button>
    <div class="year" id="year">1926</div>
    <div class="track">
      <input type="range" id="scrub" min="1885" max="2026" value="1926">
      <div class="caption" id="caption"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="/map/atlas-data.js"></script>
<script>
(async () => {
  // ── Tiles: self-hosted Protomaps extract; recolored to the MAP's cream palette ──
  const protocol = new pmtiles.Protocol();
  maplibregl.addProtocol("pmtiles", protocol.tile);
  const tilesUrl = new URL("nyc.pmtiles", location).href;
  const fontsUrl = new URL("fonts/", location).href;

  // Every key below verified against @protomaps/basemaps@5.7.2's Flavor shape.
  const CREAM_PALETTE = {
    background: "#f0efe4", earth: "#f0efe4",
    water: "#cdc5b1",
    landcover: {
      barren: "#ece8d8", farmland: "#e7e7d3", forest: "#e0e2cc", glacier: "#eeeadd",
      grassland: "#e4e5d0", scrub: "#e8e7d4", urban_area: "#edebdd",
    },
    park_a: "#e6e6d2", park_b: "#e2e3cf", wood_a: "#e2e3cf", wood_b: "#dee0cb",
    scrub_a: "#e8e7d4", scrub_b: "#e5e5d1", glacier: "#eeeadd", sand: "#ece8d8", beach: "#ece8d8",
    zoo: "#e9e8d6", hospital: "#ece9da", industrial: "#eae7d8", school: "#ebe8d9", military: "#e9e6d7",
    aerodrome: "#eae7d8", runway: "#dcd6c4", pedestrian: "#ece9da", pier: "#e7e3d2",
    buildings: "#e7e4d5",
    other: "#e9e6d6", minor_service: "#e8e5d5", minor_a: "#e6e2d1", minor_b: "#e4e0ce",
    link: "#ddd8c4", major: "#d3cdb6", highway: "#cac2a8",
    minor_service_casing: "#d9d4c1", minor_casing: "#d6d0bc", link_casing: "#cdc6b0",
    major_casing_early: "#ccc5af", major_casing_late: "#c2baa2",
    highway_casing_early: "#beb69c", highway_casing_late: "#b8b094",
    railway: "#d6d0bd", boundaries: "#b3ab97",
    bridges_other: "#e9e6d6", bridges_minor: "#e4e0ce", bridges_link: "#ddd8c4",
    bridges_major: "#d3cdb6", bridges_highway: "#cac2a8",
    bridges_other_casing: "#d9d4c1", bridges_minor_casing: "#d6d0bc",
    bridges_link_casing: "#cdc6b0", bridges_major_casing: "#c2baa2", bridges_highway_casing: "#b8b094",
    tunnel_other: "#ece9db", tunnel_minor: "#e9e5d5", tunnel_link: "#e2ddc9",
    tunnel_major: "#d9d3bd", tunnel_highway: "#d1c9b0",
    tunnel_other_casing: "#e0dcc9", tunnel_minor_casing: "#ded9c5",
    tunnel_link_casing: "#d6d0ba", tunnel_major_casing: "#cdc6ae", tunnel_highway_casing: "#c5bda2",
    city_label: "#3c3930", city_label_halo: "#f0efe4",
    subplace_label: "#6b6557", subplace_label_halo: "#f0efe4",
    state_label: "#9a9282", state_label_halo: "#f0efe4",
    country_label: "#4a463b",
    roads_label_minor: "#7a7363", roads_label_minor_halo: "#f0efe4",
    roads_label_major: "#5d5749", roads_label_major_halo: "#f0efe4",
    ocean_label: "#8e8672",
    address_label: "#9a9282", address_label_halo: "#f0efe4",
  };
  const flavor = { ...basemaps.namedFlavor("light"), ...CREAM_PALETTE };

  let layers = basemaps.layers("protomaps", flavor, { lang: "en" });
  // No generic POI pins — the music sites are the only points this map argues for.
  // Also drop the basemap's own neighborhood labels (places_subplace: kind
  // neighbourhood/macrohood) — our hand-pinned NTA labels replace them, and
  // keeping both printed "East Village" twice. City/borough labels stay.
  layers = layers.filter((l) => !/pois|address|places_subplace/.test(l.id));
  // Serif cartography: swap every label font for Libre Baskerville.
  for (const l of layers) {
    const tf = l.layout && l.layout["text-font"];
    if (tf) {
      const f = tf.join(" ").toLowerCase();
      l.layout["text-font"] = f.includes("bold")
        ? ["libre_baskerville_bold"]
        : f.includes("italic")
          ? ["libre_baskerville_regular_italic"]
          : ["libre_baskerville_regular"];
    }
  }

  const map = new maplibregl.Map({
    container: "map",
    style: {
      version: 8,
      glyphs: fontsUrl + "{fontstack}/{range}.pbf",
      sources: {
        protomaps: {
          type: "vector",
          url: "pmtiles://" + tilesUrl,
          attribution: '<a href="https://protomaps.com">Protomaps</a> © <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
        },
      },
      layers,
    },
    center: [-73.97, 40.755],
    zoom: 11.3,
    minZoom: 9.2,
    maxZoom: 17.5,
    maxBounds: [[-74.55, 40.30], [-73.40, 41.10]],
    attributionControl: { compact: true },
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "bottom-right");
  window.__atlas = map; // debugging/testing handle

  // ── Data layers ──
  // Note-driven pins (from the MAP build) override curated placeholders by name.
  const noteSites = typeof NOTE_SITES !== "undefined" ? NOTE_SITES : [];
  const norm = (n) => n.replace(/\s*\(.*\)\s*$/, "").toLowerCase();
  const fromNotes = new Set(noteSites.map((s) => norm(s.name)));
  const ALL_SITES = [...noteSites, ...SITES.filter((s) => !fromNotes.has(norm(s.name)))];
  const sitesFC = {
    type: "FeatureCollection",
    features: ALL_SITES.map((s, i) => ({
      type: "Feature", id: i,
      properties: { ...s, to2: s.to ?? 2026 },
      geometry: { type: "Point", coordinates: [s.lng, s.lat] },
    })),
  };
  const catColor = ["match", ["get", "cat"],
    ...Object.entries(CATEGORIES).flatMap(([k, v]) => [k, v.color]),
    "#75685a"];

  const state = { cats: new Set(Object.keys(CATEGORIES)), timeOn: false, year: 1926 };

  map.on("load", () => {
    // Neighborhoods (under the dots). promoteId lets feature-state key off the
    // name (the geojson features carry no ids of their own).
    map.addSource("hoods", { type: "geojson", data: new URL("neighborhoods.geojson", location).href, promoteId: "name" });
    map.addLayer({ id: "hood-fill", type: "fill", source: "hoods",
      paint: { "fill-color": "#6e6657", "fill-opacity": 0.06 } });
    map.addLayer({ id: "hood-line", type: "line", source: "hoods",
      paint: { "line-color": "#6e6657", "line-opacity": 0.55, "line-width": 1.2, "line-dasharray": [3, 3] } });
    // Hover: a solid taupe outline traces the boundary of whichever
    // neighborhood the cursor is over (invisible until feature-state flips).
    map.addLayer({ id: "hood-hover", type: "line", source: "hoods",
      paint: {
        "line-color": "#6e6657", "line-width": 1.8,
        "line-opacity": ["case", ["boolean", ["feature-state", "hover"], false], 0.9, 0],
      } });
    // Labels come from a separate POINT source — one hand-pinned anchor per
    // neighborhood at its cultural center. Labeling the polygons directly placed
    // a copy on every polygon part and tile (merged hoods showed two or three
    // names), and the geometric centroids drifted toward whichever official
    // sub-area happened to be biggest.
    map.addSource("hood-labels", { type: "geojson", data: new URL("neighborhood-labels.geojson", location).href });
    map.addLayer({ id: "hood-label", type: "symbol", source: "hood-labels",
      layout: {
        "text-field": ["get", "name"],
        "text-font": ["libre_baskerville_regular_italic"],
        "text-size": ["interpolate", ["linear"], ["zoom"], 10, 11, 14, 16],
      },
      paint: { "text-color": "#6b6557", "text-halo-color": "#f0efe4", "text-halo-width": 1.6 } });

    // Sites
    map.addSource("sites", { type: "geojson", data: sitesFC });
    map.addLayer({ id: "site-dots", type: "circle", source: "sites",
      paint: {
        "circle-color": catColor,
        "circle-radius": ["interpolate", ["linear"], ["zoom"], 10, 4.5, 13, 7, 16, 10],
        "circle-stroke-color": "#fefdfb", "circle-stroke-width": 1.6,
      } });
    map.addLayer({ id: "site-labels", type: "symbol", source: "sites",
      minzoom: 13.2,
      layout: {
        "text-field": ["get", "name"],
        "text-font": ["libre_baskerville_regular"],
        "text-size": 12.5,
        "text-offset": [0, 1.1], "text-anchor": "top", "text-optional": true,
      },
      paint: { "text-color": "#3c3930", "text-halo-color": "#f0efe4", "text-halo-width": 1.5 } });

    applyFilters();

    // Popups
    const popup = (lngLat, html) =>
      new maplibregl.Popup({ maxWidth: "300px" }).setLngLat(lngLat).setHTML(html).addTo(map);

    map.on("click", "site-dots", (e) => {
      const p = e.features[0].properties;
      const years = p.from + "–" + (p.to && p.to !== "null" ? p.to : "now");
      const link = p.note && p.note !== "null"
        ? '<a class="pp-link" href="' + p.note + '">Open in the MAP →</a>'
        : '<span class="pp-link soon">MAP note coming</span>';
      popup(e.lngLat, '<p class="pp-name">' + p.name + '</p><p class="pp-meta">' + years + " · " + p.addr + " · " + p.hood + '</p><p class="pp-blurb">' + p.blurb + "</p>" + link);
    });
    map.on("click", (e) => {
      // Neighborhood story when the click missed every dot.
      const dots = map.queryRenderedFeatures(e.point, { layers: ["site-dots"] });
      if (dots.length) return;
      if (!map.getLayoutProperty || map.getLayoutProperty("hood-fill", "visibility") === "none") return;
      const hoods = map.queryRenderedFeatures(e.point, { layers: ["hood-fill"] });
      if (!hoods.length) return;
      const name = hoods[0].properties.name;
      const s = NEIGHBORHOOD_STORIES[name];
      if (!s) return;
      const link = s.note
        ? '<a class="pp-link" href="' + s.note + '">Open in the MAP →</a>'
        : '<span class="pp-link soon">Neighborhood note coming</span>';
      popup(e.lngLat, '<p class="pp-name">' + name + '</p><p class="pp-blurb">' + s.story + "</p>" + link);
    });
    map.on("mouseenter", "site-dots", () => (map.getCanvas().style.cursor = "pointer"));
    map.on("mouseleave", "site-dots", () => (map.getCanvas().style.cursor = ""));

    // Hover state for the neighborhood outline.
    let hoveredHood = null;
    map.on("mousemove", "hood-fill", (e) => {
      const id = e.features[0].id;
      if (id === hoveredHood) return;
      if (hoveredHood !== null) map.setFeatureState({ source: "hoods", id: hoveredHood }, { hover: false });
      hoveredHood = id;
      map.setFeatureState({ source: "hoods", id }, { hover: true });
    });
    map.on("mouseleave", "hood-fill", () => {
      if (hoveredHood !== null) map.setFeatureState({ source: "hoods", id: hoveredHood }, { hover: false });
      hoveredHood = null;
    });
  });

  // ── Filters: categories × optional year ──
  function applyFilters() {
    if (!map.getLayer("site-dots")) return;
    const cats = ["in", ["get", "cat"], ["literal", [...state.cats]]];
    const f = state.timeOn
      ? ["all", cats, ["<=", ["get", "from"], state.year], [">=", ["get", "to2"], state.year]]
      : cats;
    map.setFilter("site-dots", f);
    map.setFilter("site-labels", f);
    const alive = ALL_SITES.filter(
      (s) => state.cats.has(s.cat) && (!state.timeOn || ((s.from ?? 1885) <= state.year && (s.to ?? 2026) >= state.year)),
    ).length;
    const live = ERAS.filter((e) => e.from <= state.year && state.year <= e.to);
    if (state.timeOn) {
      const linked = live.map((e) =>
        e.note ? '<a href="' + e.note + '">' + e.name + "</a>" : e.name,
      );
      caption.innerHTML = alive + " sites alive" + (live.length ? " · " + linked.join(" · ") : " · between eras");
    }
    document.querySelectorAll(".era").forEach((el, i) =>
      el.classList.toggle("on", state.timeOn && ERAS[i].from <= state.year && state.year <= ERAS[i].to));
  }

  // Category chips double as the legend.
  const chipBox = document.getElementById("chips");
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const b = document.createElement("button");
    b.className = "chip";
    b.innerHTML = '<span class="dot" style="background:' + cat.color + '"></span>' + key;
    b.onclick = () => {
      state.cats.has(key) ? state.cats.delete(key) : state.cats.add(key);
      b.classList.toggle("off", !state.cats.has(key));
      applyFilters();
    };
    chipBox.appendChild(b);
  }

  // Neighborhood toggle.
  document.getElementById("hoods").onchange = (e) => {
    const vis = e.target.checked ? "visible" : "none";
    for (const id of ["hood-fill", "hood-line", "hood-hover", "hood-label"])
      if (map.getLayer(id)) map.setLayoutProperty(id, "visibility", vis);
  };

  // ── The time deck (folded-in Lab B) ──
  const deck = document.getElementById("deck");
  const yearEl = document.getElementById("year");
  const scrub = document.getElementById("scrub");
  const caption = document.getElementById("caption");
  const playBtn = document.getElementById("play");
  let playing = false, timer = null;

  const setYear = (y) => {
    state.year = Math.max(1885, Math.min(2026, y));
    yearEl.textContent = state.year;
    scrub.value = state.year;
    applyFilters();
  };
  const stop = () => { playing = false; clearInterval(timer); playBtn.textContent = "▶"; };

  document.getElementById("timeOn").onchange = (e) => {
    state.timeOn = e.target.checked;
    deck.hidden = !state.timeOn;
    if (!state.timeOn) stop();
    applyFilters();
  };

  const eraBox = document.getElementById("eras");
  for (const e of ERAS) {
    // The note link is a SIBLING of the button (nested interactive elements are
    // invalid HTML and confuse keyboards/screen readers); CSS groups them.
    const wrap = document.createElement("span");
    wrap.style.cssText = "display:inline-flex;align-items:center;gap:2px;flex:0 0 auto;";
    const b = document.createElement("button");
    b.className = "era";
    b.textContent = e.name + " " + e.from + "–" + e.to;
    b.onclick = () => { stop(); setYear(e.from); };
    wrap.appendChild(b);
    if (e.note) {
      const a = document.createElement("a");
      a.href = e.note; a.title = "Open the note"; a.textContent = "↗";
      a.style.cssText = "font-size:.72rem;color:#2a6f4e;text-decoration:none;padding:0 .15rem;";
      wrap.appendChild(a);
    }
    eraBox.appendChild(wrap);
  }

  playBtn.onclick = () => {
    playing = !playing;
    if (playing) {
      playBtn.textContent = "❚❚";
      if (state.year >= 2026) setYear(1885);
      timer = setInterval(() => { setYear(state.year + 1); if (state.year >= 2026) stop(); }, 140);
    } else stop();
  };
  scrub.oninput = () => { stop(); setYear(+scrub.value); };

  setYear(1926);
})();
</script>
</body>
</html>
