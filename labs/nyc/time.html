<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>MAP / NYC — Time Machine (lab)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&display=swap">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root { --cream:#f0efe4; --light:#fefdfb; --dark:#111; --gray:#9a958a; --serif:"Source Serif 4", Georgia, serif; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--cream); font-family:var(--serif); color:var(--dark); }
  #map { position:fixed; inset:0; }

  .brand {
    position:fixed; top:12px; left:12px; z-index:1000; display:flex; align-items:center; gap:.5rem;
    padding:.5rem .8rem; border-radius:12px; font-size:1.05rem; font-weight:500;
    background:color-mix(in srgb, var(--light) 72%, transparent);
    -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
    border:1px solid rgba(110,105,95,.25);
  }
  .brand svg { width:1.2rem; height:1.2rem; }
  .brand .lab { font-size:.6rem; letter-spacing:.12em; color:var(--gray); border:1px solid rgba(110,105,95,.4); padding:.08rem .35rem; border-radius:99px; }
  .brand a { color:inherit; text-decoration:none; }

  /* ── The time deck ── */
  .deck {
    position:fixed; left:50%; bottom:max(14px, env(safe-area-inset-bottom)); transform:translateX(-50%);
    z-index:1000; width:min(680px, calc(100vw - 20px));
    padding:.85rem 1rem .9rem; border-radius:18px;
    background:color-mix(in srgb, var(--light) 74%, transparent);
    -webkit-backdrop-filter:blur(16px) saturate(1.3); backdrop-filter:blur(16px) saturate(1.3);
    border:1px solid rgba(110,105,95,.25); box-shadow:0 10px 36px rgba(17,17,17,.14);
  }
  .eras { display:flex; gap:.35rem; overflow-x:auto; padding-bottom:.55rem; scrollbar-width:none; }
  .eras::-webkit-scrollbar { display:none; }
  .era {
    flex:0 0 auto; padding:.22rem .6rem; font:inherit; font-size:.74rem; white-space:nowrap;
    border:1px solid rgba(110,105,95,.35); border-radius:999px; background:rgba(254,253,251,.5);
    color:rgba(17,17,17,.8); cursor:pointer;
  }
  .era.on { background:var(--dark); color:var(--cream); border-color:var(--dark); }

  .transport { display:flex; align-items:center; gap:.9rem; }
  .play {
    flex:0 0 auto; width:44px; height:44px; border-radius:50%; border:none; cursor:pointer;
    background:var(--dark); color:var(--cream); font-size:1rem; display:flex; align-items:center; justify-content:center;
  }
  .year { flex:0 0 auto; width:4.2ch; font-size:1.9rem; font-weight:600; letter-spacing:.02em; text-align:center; font-variant-numeric:tabular-nums; }
  .track { flex:1; display:flex; flex-direction:column; gap:.15rem; }
  input[type=range] { width:100%; accent-color:#3a3a35; }
  .caption { font-size:.74rem; color:var(--gray); min-height:1.1em; }

  .leaflet-popup-content-wrapper { background:var(--light); border-radius:12px; box-shadow:0 10px 36px rgba(17,17,17,.22); }
  .leaflet-popup-content { margin:.95rem 1.05rem; font-family:var(--serif); color:var(--dark); }
  .pp-name { font-size:1rem; font-weight:600; margin:0; }
  .pp-meta { font-size:.72rem; color:var(--gray); margin:.15rem 0 .4rem; }
  .pp-blurb { font-size:.84rem; line-height:1.5; margin:0; }
  .pp-link { display:inline-block; margin-top:.5rem; font-size:.78rem; color:#2a6f4e; text-decoration:none; border-bottom:1px solid rgba(42,111,78,.4); }

  @keyframes ping { 0%{r:8} 50%{r:13} 100%{r:8} }
</style>
</head>
<body>
<div id="map"></div>

<div class="brand">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <line x1="7.5" y1="13" x2="4" y2="6.5" stroke="#111" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="7.5" y1="13" x2="16.5" y2="9" stroke="#111" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="7.5" y1="13" x2="11" y2="20" stroke="#111" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="7.5" cy="13" r="2.6" fill="#111"/><circle cx="4" cy="6.5" r="1.5" fill="#111"/>
    <circle cx="16.5" cy="9" r="1.7" fill="#111"/><circle cx="11" cy="20" r="1.4" fill="#111"/>
  </svg>
  <a href="index.html">MAP&nbsp;/&nbsp;NYC</a> <span class="lab">LAB&nbsp;B</span>
</div>

<div class="deck">
  <div class="eras" id="eras"></div>
  <div class="transport">
    <button class="play" id="play" aria-label="Play through the years">▶</button>
    <div class="year" id="year">1926</div>
    <div class="track">
      <input type="range" id="scrub" min="1885" max="2026" value="1926">
      <div class="caption" id="caption"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script>
  const map = L.map('map', { zoomControl:false }).setView([40.7700, -73.9600], 11.5);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'&copy; OSM &copy; CARTO', maxZoom:19,
  }).addTo(map);

  let year = 1926, playing = false, timer = null;

  const markers = SITES.map(s => {
    const m = L.circleMarker([s.lat, s.lng], {
      radius:8, color:'#fefdfb', weight:1.6,
      fillColor:CATEGORIES[s.cat].color, fillOpacity:.92,
    });
    const yrs = s.from + '–' + (s.to ?? 'now');
    const link = s.note ? '<a class="pp-link" href="' + s.note + '">Open in the MAP →</a>' : '';
    m.bindPopup('<p class="pp-name">' + s.name + '</p><p class="pp-meta">' + yrs + ' · ' + s.hood + '</p><p class="pp-blurb">' + s.blurb + '</p>' + link, { maxWidth:300 });
    m.__site = s;
    return m;
  });

  const yearEl = document.getElementById('year');
  const scrub = document.getElementById('scrub');
  const caption = document.getElementById('caption');

  function setYear(y) {
    year = Math.max(1885, Math.min(2026, y));
    yearEl.textContent = year;
    scrub.value = year;
    let on = 0;
    markers.forEach(m => {
      const s = m.__site;
      const active = s.from <= year && year <= (s.to ?? 2026);
      if (active && !map.hasLayer(m)) m.addTo(map);
      if (!active && map.hasLayer(m)) map.removeLayer(m);
      if (active) on++;
    });
    const live = ERAS.filter(e => e.from <= year && year <= e.to).map(e => e.name);
    caption.textContent = on + ' sites alive · ' + (live.length ? live.join(' · ') : 'between eras');
    document.querySelectorAll('.era').forEach((el, i) => {
      el.classList.toggle('on', ERAS[i].from <= year && year <= ERAS[i].to);
    });
  }

  // Era chips: jump to the era's first year (and let it play through)
  const eraBox = document.getElementById('eras');
  ERAS.forEach(e => {
    const b = document.createElement('button');
    b.className = 'era';
    b.textContent = e.name + ' ' + e.from + '–' + e.to;
    b.onclick = () => setYear(e.from);
    eraBox.appendChild(b);
  });

  const playBtn = document.getElementById('play');
  function stop() { playing = false; clearInterval(timer); playBtn.textContent = '▶'; }
  playBtn.onclick = () => {
    playing = !playing;
    if (playing) {
      playBtn.textContent = '❚❚';
      if (year >= 2026) setYear(1885);
      timer = setInterval(() => {
        setYear(year + 1);
        if (year >= 2026) stop();
      }, 140);
    } else stop();
  };
  scrub.oninput = () => { stop(); setYear(+scrub.value); };

  setYear(1926);
</script>
</body>
</html>
